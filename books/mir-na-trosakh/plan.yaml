- name: Границы и будущее
  introduction: В заключительной части мы заглянем в завтрашний день, обсудим новые
    сверхпрочные материалы, гибридные концепции транспорта и пределы возможностей
    тросовых систем.
  chapters:
  - name: Канатные поезда и гибридные системы (APM)
    bullet_points:
    - Современные автоматизированные пиплмуверы в крупнейших аэропортах мира (технологии
      типа Cable Liner)
    - Экспериментальные транспортные системы на воздушной подушке, использующие скрытую
      тросовую тягу
    - 'Концепция МиниМетро: легкая интеграция малогабаритного канатного транспорта
      в плотную историческую застройку'
    - 'Полная автоматизация процесса: поезда без машинистов, централизованная диспетчеризация
